[editor]
tab_width = 4
font_size = 14
line_numbers = 1
line_wrapping = 0

# Built-in themes: dragon, ember, glacier, black+
theme = "dragon"

[lsp]
auto_format = 0
auto_hover = 1
diagnostic_delay_ms = 100

# Add or override language support without recompiling.
# A configured language can provide file extensions, indentation/comment
# behavior, a tree-sitter parser name, and an LSP command.
#[[language]]
#id = "nix"
#extensions = ["nix"]
#tab_width = 2
#use_tabs = false
#line_comment = "#"
#tree_sitter = "nix"
#tree_sitter_path = "plugins/nix/libtree-sitter-nix.so"
#format_command = "nixfmt {file}"
#lsp_command = "nil"
#lsp_args = []
#keywords = ["let", "in", "rec", "with"]
#type_keywords = ["path", "attrs"]
#macro_keywords = ["builtins"]

# Plugins are TOML manifests that can contribute language entries.
# If path is a directory, Dragon reads path/dragon-plugin.toml.
#[[plugin]]
#name = "gleam-tools"
#path = "plugins/gleam"
#enabled = true
# Use :plugins or :config-reload after editing this file.

# Optional per-color overrides for the selected theme.
# Values are RGBA floats in the 0.0-1.0 range.
[theme]
# name = "black+"
# bg = [0.0, 0.0, 0.0, 1.0]
# fg = [1.0, 1.0, 1.0, 1.0]
